<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ICSScout{% endblock %} - OT Security Assessment</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        .dark {
            background: #0f172a;
            color: #e2e8f0;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .packet-row:hover {
            background: rgba(100, 116, 139, 0.2);
            cursor: pointer;
        }

        .protocol-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .protocol-s7 { background: #3b82f6; color: white; }
        .protocol-modbus { background: #10b981; color: white; }
        .protocol-opcua { background: #f59e0b; color: white; }
        .protocol-other { background: #6b7280; color: white; }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }

        /* Hex viewer styles */
        .hex-viewer {
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .hex-byte {
            display: inline-block;
            width: 2ch;
            margin-right: 0.5ch;
        }

        .hex-ascii {
            color: #94a3b8;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="dark min-h-screen">
    <!-- Navigation -->
    <nav class="glass border-b border-slate-700">
        <div class="w-[95%] max-w-none mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <!-- Logo -->
                    <div class="flex-shrink-0 flex items-center">
                        <i class="fas fa-shield-alt text-3xl text-indigo-500 mr-3"></i>
                        <span class="text-2xl font-bold gradient-bg bg-clip-text text-transparent">
                            ICSScout
                        </span>
                        <span class="ml-2 text-xs text-slate-400">v{{ version }}</span>
                    </div>

                    <!-- Navigation Links -->
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-home mr-2"></i> Dashboard
                        </a>
                        <a href="/packet-analyzer" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/packet-analyzer' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-network-wired mr-2"></i> Packet Analyzer
                        </a>
                        <a href="/network-scanner" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/network-scanner' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-radar mr-2"></i> Network Scanner
                        </a>
                        <a href="/vulnerability-scanner" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/vulnerability-scanner' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-bug mr-2"></i> Vulnerabilities
                        </a>
                        <a href="/device-manager" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/device-manager' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-server mr-2"></i> Devices
                        </a>
                        <a href="/monitoring" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/monitoring' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-heartbeat mr-2"></i> Monitoring
                        </a>
                        <a href="/s7-authentication" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/s7-authentication' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-lock mr-2"></i> S7 Auth & OT Scan
                        </a>
                        <a href="/risk-assessment" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/risk-assessment' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-shield-virus mr-2 text-red-500"></i> Risk Assessment
                        </a>
                        <a href="/sessions" class="nav-link inline-flex items-center px-1 pt-1 text-sm font-medium {% if request.path == '/sessions' %}text-indigo-400 border-b-2 border-indigo-500{% else %}text-slate-300 hover:text-white{% endif %}">
                            <i class="fas fa-database mr-2 text-purple-500"></i> Sessions
                        </a>
                    </div>
                </div>

                <!-- Right side -->
                <div class="flex items-center">
                    <!-- Status indicator -->
                    <div class="flex items-center mr-4">
                        <div class="w-2 h-2 bg-green-500 rounded-full pulse mr-2"></div>
                        <span class="text-sm text-slate-400">Connected</span>
                    </div>

                    <!-- User menu -->
                    <div class="ml-3 relative">
                        <div class="flex items-center">
                            <i class="fas fa-user-circle text-2xl text-slate-400"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="w-[95%] max-w-none mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2">
        <!-- Toasts will be inserted here -->
    </div>

    <!-- Global Scripts -->
    <script>
        // Socket.IO connection (global variable for all pages)
        var socket = io();

        socket.on('connect', function() {
            console.log('Connected to server');
            showToast('Connected to ICSScout', 'success');
        });

        socket.on('disconnect', function() {
            console.log('Disconnected from server');
            showToast('Disconnected from server', 'error');
        });

        // Toast notification function
        function showToast(message, type = 'info', duration = 3000) {
            const toastContainer = document.getElementById('toast-container');

            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };

            const toast = document.createElement('div');
            toast.className = `${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3 transform transition-all duration-300 translate-x-full`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span>${message}</span>
            `;

            toastContainer.appendChild(toast);

            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-x-full');
            }, 10);

            // Remove after duration
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, duration);
        }

        // API helper functions
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(endpoint, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'API call failed');
                }

                return data;
            } catch (error) {
                console.error('API Error:', error);
                showToast(error.message, 'error');
                throw error;
            }
        }

        // Format bytes
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Format timestamp
        function formatTimestamp(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString() + '.' + date.getMilliseconds().toString().padStart(3, '0');
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
