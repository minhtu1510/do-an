# =============================================================
# testbed.conf — Cấu hình chung cho toàn bộ Testbed
# =============================================================
# Chỉnh sửa file này 1 LẦN DUY NHẤT rồi COPY sang tất cả máy
# Mỗi máy chỉ đọc đúng phần biến nó cần
# =============================================================

# ─── IP CÁC THIẾT BỊ ────────────────────────────────────────
TARGET_IP="192.168.1.10"       # IP PLC (Siemens S7)
LOGGER_IP="192.168.1.200"      # IP máy Logger/Collector
SUBNET="192.168.1.0/24"        # Mạng OT

# ─── CẤU HÌNH LOGGER ────────────────────────────────────────
DATA_DIR="/data"               # Thư mục lưu PCAP + dataset (chỉ dùng trên Logger)
IFACE="eth0"                   # NIC nhận SPAN traffic (chỉ dùng trên Logger)
LOGGER_PORT="9000"             # Cổng webhook nhận label events
AUTO_EXTRACT="1"               # Tự extract feature sau capture (1=có, 0=không)

# ─── CẤU HÌNH THỜI LƯỢNG (giây) ─────────────────────────────
DUR_DAY1=28800    # Ngày 1: 8 tiếng
DUR_DAY2=28800    # Ngày 2: 8 tiếng
DUR_DAY3=25200    # Ngày 3: 7 tiếng
DUR_DAY4=25200    # Ngày 4: 7 tiếng
DUR_DAY5=21600    # Ngày 5: 6 tiếng
