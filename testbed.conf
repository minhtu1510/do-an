# =============================================================
# testbed.conf - One attacker host, one controller host, one S7 PLC
# =============================================================
# Copy this file to both hosts, then adjust only host-specific values
# such as CAPTURE_IFACE if the interface name differs.
# =============================================================

# PLC / Siemens S7-1500 default connection.
TARGET_IP="192.168.210.211"
RACK="0"
SLOT="1"
SUBNET="192.168.210.0/24"
IT_SERVER_IP=""

# Host metadata written to labels and tag logs.
CONTROLLER_HOST_ID="controller_host"
ATTACKER_HOST_ID="attacker_host"

# Capture settings.
# Run `tshark -D` on each host and put the correct interface here, or pass --iface.
# Windows/Npcap usually looks like: \Device\NPF_{GUID}
# Linux usually looks like: eth0, enp3s0, wlan0, ...
CAPTURE_ENABLED="1"
CAPTURE_IFACE=""
CAPTURE_FILTER=""

# Output directories relative to the repo.
CAPTURE_DIR="captures"
LOG_DIR="logs"
LABEL_DIR="labels"

# PLC preflight.
# Keep PREFLIGHT_WRITE_TEST=0 unless you have confirmed M5.7 is safe to toggle.
PREFLIGHT_ENABLED="1"
REQUIRE_PREFLIGHT="1"
PREFLIGHT_WRITE_TEST="0"

# CPU control is disabled by default for S7-1500 security compatibility.
# Enable only if your lab CPU explicitly permits remote STOP/HOT_START and you accept the risk.
ENABLE_CPU_CONTROL_ATTACK="0"
ALLOW_PA_WRITE_ATTACKS="0"

# Controller behavior.
ENABLE_TAG_LOGGER="1"
TAG_LOG_INTERVAL="0.5"
ENABLE_HMI="1"
HMI_ENABLE_LEGIT_WRITES="0"
HMI_LEGIT_WRITE_PROB="0.02"
HMI_POLL_MIN_S="1.0"
HMI_POLL_MAX_S="2.0"

# Attack schedule defaults. Increase ATTACK_REPETITIONS for publication runs.
ATTACK_REPETITIONS="3"
ATTACK_DURATION_S="600"
SHORT_ATTACK_DURATION_S="300"
WARMUP_S="300"
BENIGN_GAP_S="300"
COOLDOWN_S="600"

# Restore defaults for conveyor Merker tags.
DEFAULT_CD_MS="5000"
RESTORE_TIMES1_MS="0"
RESTORE_START_PULSE="1"

# Conservative DoS/fuzz intensity defaults for S7-1500 lab use.
S7_FLOOD_THREADS="6"
SYN_FLOOD_THREADS="20"
FUZZ_PAYLOAD_MIN="12"
FUZZ_PAYLOAD_MAX="80"

# Controller/attacker runtime when a role is mostly benign.
DAY1_DURATION_S="14400"
DAY2_DURATION_S="14400"
DAY3_DURATION_S="10800"
DAY4_DURATION_S="14400"
DAY5_DURATION_S="10800"
DAY6_DURATION_S="14400"
